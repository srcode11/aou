<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Site Title -->
  <title>Register | AOU Study Tracker</title>
  
  <!-- SEO Metadata -->
  <meta name="description" content="Create an account on AOU Study Tracker to start tracking your academic journey." />
  <meta name="keywords" content="AOU Register, New Account, Study Tracker" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/logo.png" />
  
  <!-- Stylesheets -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
  <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
      <div class="flex flex-col items-center mb-8">
        <img src="img/logo.png" alt="AOU Study Tracker" class="w-32 h-32 mb-4" />
        <h1 class="text-3xl font-bold text-gray-800">Create Account</h1>
        <p class="text-gray-600 mt-2">Join AOU Study Tracker</p>
      </div>
      <form class="space-y-5" id="registerForm">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label><input type="text"
            id="name"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            placeholder="Enter your full name" required="" value="" />
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label><input type="email"
            id="email"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            placeholder="Enter your email" required="" value="" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label><input
            type="password" id="password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            placeholder="Enter your password" required="" value="" />
        </div>
        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">Confirm
            Password</label><input type="password" id="confirmPassword"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            placeholder="Confirm your password" required="" value="" />
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200 shadow-md hover:shadow-lg">
          Register
        </button>
      </form>
      <div class="mt-6 text-center">
        <p class="text-gray-600">
          Already have an account?
          <a class="text-blue-600 hover:text-blue-700 font-medium" href="index.html">Login here</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Registration logic -->
  <script>
    document.getElementById('registerForm').addEventListener('submit', function (e) {
      e.preventDefault();
      window.location.href = 'select-courses.html';
    });
  </script>
</body>

</html>
