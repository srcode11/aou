<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Site Title -->
  <title>MCQ Quiz | AOU Study Tracker</title>
  
  <!-- SEO Metadata -->
  <meta name="description" content="Take a quick MCQ quiz to test your knowledge on AOU study topics." />
  <meta name="keywords" content="MCQ, Quiz, AOU Practice, Self-Testing" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/logo.png" />
  
  <!-- Stylesheets & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .option-btn.selected { border-color: #2563eb; background-color: #eff6ff; }
    .option-btn.correct { border-color: #10b981; background-color: #ecfdf5; }
    .option-btn.incorrect { border-color: #ef4444; background-color: #fef2f2; }
    .hidden { display: none; }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="home.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
        <img src="img/logo.png" alt="AOU Logo" class="w-9 h-9 rounded-full object-cover" />
        <span class="font-bold text-gray-800 text-lg">AOU Study Tracker</span>
      </a>
      <div class="flex items-center gap-6 text-sm font-medium text-gray-600">
        <a href="home.html" class="flex items-center gap-1.5 hover:text-blue-600 transition-colors">Dashboard</a>
        <a href="courses.html" class="flex items-center gap-1.5 hover:text-blue-600 transition-colors">Courses</a>
        <a href="index.html" class="flex items-center gap-1.5 hover:text-red-500 transition-colors">Logout</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-8">
    
    <!-- Back Button -->
    <a id="backBtn" href="#" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-blue-600 transition-colors mb-6 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back to Practice
    </a>

    <!-- Quiz Container -->
    <div id="quizContainer" class="bg-white rounded-3xl p-8 md:p-12 border border-gray-100 shadow-sm max-w-4xl mx-auto">
      
      <!-- Quiz Progress Header -->
      <div class="flex items-center justify-between mb-2">
        <span id="questionCounter" class="text-xs font-semibold text-gray-400">Question 1 of 2</span>
        <span id="scoreTracker" class="text-xs font-semibold text-gray-400">Score: 0/0</span>
      </div>
      <div class="w-full bg-gray-100 h-1.5 rounded-full mb-8 overflow-hidden">
        <div id="quizProgressBar" class="bg-blue-600 h-full transition-all duration-500" style="width: 50%"></div>
      </div>

      <!-- Question Content -->
      <h2 id="questionText" class="text-2xl font-bold text-gray-900 mb-8">Loading question...</h2>

      <!-- Options Grid -->
      <div id="optionsGrid" class="space-y-4 mb-8">
        <!-- Options generated via JS -->
      </div>

      <!-- Feedback Section -->
      <div id="feedbackBox" class="hidden mb-8 p-4 rounded-xl border flex items-center gap-3">
        <div id="feedbackIcon" class="w-6 h-6 rounded-full flex items-center justify-center text-white font-bold text-xs"></div>
        <p id="feedbackText" class="text-sm font-semibold"></p>
      </div>

      <!-- Action Button -->
      <button id="actionBtn" disabled class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-200 disabled:cursor-not-allowed text-white py-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-100">
        Submit Answer
      </button>
    </div>

    <!-- Results Container -->
    <div id="resultsContainer" class="hidden bg-white rounded-3xl p-12 border border-gray-100 shadow-sm max-w-2xl mx-auto text-center">
      <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Quiz Complete!</h1>
      <p id="finalScoreText" class="text-lg text-gray-500 mb-8">You scored 2 out of 2</p>
      
      <div class="w-full bg-gray-100 h-3 rounded-full mb-4 overflow-hidden">
        <div id="finalProgressBar" class="bg-green-500 h-full transition-all duration-1000" style="width: 0%"></div>
      </div>
      <p id="finalPercent" class="text-xs font-bold text-gray-400 mb-10 uppercase tracking-widest">0% Correct</p>

      <div class="flex flex-col sm:flex-row gap-4">
        <button onclick="location.reload()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-100">
          Try Again
        </button>
        <a id="finishBtn" href="#" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 py-4 rounded-2xl font-bold transition-all text-center">
          Back to Practice
        </a>
      </div>
    </div>

  </main>

  <!-- JavaScript logic for quiz functionality -->
  <script>
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let selectedOption = null;
    let isAnswered = false;
    let courseId = "";

    async function initQuiz() {
      const urlParams = new URLSearchParams(window.location.search);
      courseId = urlParams.get('id');

      if (!courseId) {
        window.location.href = 'courses.html';
        return;
      }

      // Update Links
      document.getElementById('backBtn').href = `practice.html?id=${courseId}`;
      document.getElementById('finishBtn').href = `practice.html?id=${courseId}`;

      try {
        const response = await fetch(`${API_URL}/api/questions/subject/${courseId}`);
        const allQuestions = await response.json();
        
        // Filter MCQ questions (those with options array not empty)
        questions = allQuestions.filter(q => q.options && q.options.length > 0);
        
        if (questions.length > 0) {
          renderQuestion();
        } else {
          alert("No MCQ questions available for this course.");
          window.location.href = `practice.html?id=${courseId}`;
        }
      } catch (err) {
        console.error("Error loading quiz:", err);
        alert("Error loading questions. Make sure the backend is running.");
      }
    }

    function renderQuestion() {
      isAnswered = false;
      selectedOption = null;
      
      const q = questions[currentIndex];
      
      // Update Headers
      document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      document.getElementById('scoreTracker').textContent = `Score: ${score}/${currentIndex}`;
      document.getElementById('quizProgressBar').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
      
      // Update Text
      document.getElementById('questionText').textContent = q.question;
      
      // Render Options
      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';
      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn w-full p-5 text-left border-2 border-gray-100 rounded-2xl font-medium text-gray-700 hover:border-blue-200 transition-all flex items-center justify-between group';
        btn.innerHTML = `
          <span>${opt}</span>
          <div class="status-icon hidden w-6 h-6 rounded-full items-center justify-center"></div>
        `;
        btn.onclick = () => selectOption(idx, btn);
        grid.appendChild(btn);
      });

      // Reset UI
      document.getElementById('feedbackBox').classList.add('hidden');
      document.getElementById('actionBtn').textContent = 'Submit Answer';
      document.getElementById('actionBtn').disabled = true;
      document.getElementById('actionBtn').onclick = submitAnswer;
    }

    function selectOption(idx, btn) {
      if (isAnswered) return;
      
      selectedOption = idx;
      
      // Clear previous selections
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      
      document.getElementById('actionBtn').disabled = false;
    }

    function submitAnswer() {
      if (isAnswered || selectedOption === null) return;
      isAnswered = true;
      
      const q = questions[currentIndex];
      const isCorrect = q.options[selectedOption] === q.correctAnswer;
      
      if (isCorrect) score++;

      // Update UI for options
      const btns = document.querySelectorAll('.option-btn');
      btns.forEach((btn, idx) => {
        btn.classList.remove('selected');
        if (btn.innerText.trim() === q.correctAnswer) {
          btn.classList.add('correct');
          btn.querySelector('.status-icon').classList.remove('hidden');
          btn.querySelector('.status-icon').classList.add('flex', 'bg-green-500');
          btn.querySelector('.status-icon').innerHTML = '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"/></svg>';
        } else if (idx === selectedOption) {
          btn.classList.add('incorrect');
        }
      });

      // Show Feedback Box
      const feedback = document.getElementById('feedbackBox');
      const fIcon = document.getElementById('feedbackIcon');
      const fText = document.getElementById('feedbackText');
      
      feedback.classList.remove('hidden');
      if (isCorrect) {
        feedback.className = 'mb-8 p-4 rounded-xl border border-green-200 bg-green-50 flex items-center gap-3';
        fIcon.className = 'w-6 h-6 rounded-full flex items-center justify-center bg-green-500 text-white font-bold text-xs';
        fIcon.innerHTML = '✓';
        fText.textContent = 'Correct! Well done!';
        fText.className = 'text-sm font-semibold text-green-700';
      } else {
        feedback.className = 'mb-8 p-4 rounded-xl border border-red-200 bg-red-50 flex items-center gap-3';
        fIcon.className = 'w-6 h-6 rounded-full flex items-center justify-center bg-red-500 text-white font-bold text-xs';
        fIcon.innerHTML = '✕';
        fText.textContent = `Incorrect. The correct answer is: ${q.correctAnswer}`;
        fText.className = 'text-sm font-semibold text-red-700';
      }

      // Update Score Tracker immediately
      document.getElementById('scoreTracker').textContent = `Score: ${score}/${currentIndex + 1}`;

      // Save progress to backend
      saveProgress(isCorrect);

      // Update Action Button
      if (currentIndex < questions.length - 1) {
        document.getElementById('actionBtn').textContent = 'Next Question';
        document.getElementById('actionBtn').onclick = () => {
          currentIndex++;
          renderQuestion();
        };
      } else {
        document.getElementById('actionBtn').textContent = 'View Results';
        document.getElementById('actionBtn').onclick = showResults;
      }
    }

    async function saveProgress(isCorrect) {
      try {
        await fetch(`${API_URL}/api/progress`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: 'student123',
            subjectId: courseId,
            isCorrect: isCorrect
          })
        });
      } catch (err) {
        console.error("Error saving progress:", err);
      }
    }

    function showResults() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('resultsContainer').classList.remove('hidden');
      
      const percent = Math.round((score / questions.length) * 100);
      document.getElementById('finalScoreText').textContent = `You scored ${score} out of ${questions.length}`;
      document.getElementById('finalPercent').textContent = `${percent}% Correct`;
      
      setTimeout(() => {
        document.getElementById('finalProgressBar').style.width = `${percent}%`;
        if (percent < 50) {
          document.getElementById('finalProgressBar').classList.replace('bg-green-500', 'bg-orange-500');
        }
      }, 100);
    }

    initQuiz();
  </script>

</body>
</html>
