<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Site Title -->
  <title>Long Questions | AOU Study Tracker</title>
  
  <!-- SEO Metadata -->
  <meta name="description" content="Prepare for essay-style exams with detailed long questions and expert answers." />
  <meta name="keywords" content="Long Questions, Essay Questions, Exam Preparation, AOU" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/logo.png" />
  
  <!-- Stylesheets & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .answer-card { max-height: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0, 1, 0, 1); opacity: 0; }
    .answer-card.visible { max-height: 1000px; opacity: 1; transition: all 0.5s cubic-bezier(1, 0, 1, 0); }
  </style>
</head>

<body class="bg-[#F8FAFC] min-h-screen pb-20">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="home.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
        <img src="img/logo.png" alt="AOU Logo" class="w-10 h-10 rounded-full object-cover" />
        <span class="font-black text-gray-900 text-xl tracking-tight">AOU Study Tracker</span>
      </a>
      <div class="flex items-center gap-8 text-sm font-bold text-gray-500">
        <a href="home.html" class="hover:text-blue-600 transition-colors">Dashboard</a>
        <a href="courses.html" class="hover:text-blue-600 transition-colors">Courses</a>
        <a href="index.html" class="hover:text-red-500 transition-colors">Logout</a>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-12">
    
    <!-- Header Area -->
    <div class="flex items-center justify-between mb-12">
      <a id="backBtn" href="practice.html" class="w-12 h-12 rounded-2xl bg-white border border-gray-100 shadow-sm flex items-center justify-center hover:bg-gray-50 transition-all text-gray-400 hover:text-gray-900">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      </a>
      <div class="text-center">
        <h1 class="text-3xl font-black text-gray-900 mb-1">Long Questions</h1>
        <p class="text-gray-400 font-bold" id="courseDisplay">Loading course...</p>
      </div>
      <div class="w-12"></div> <!-- Spacer -->
    </div>

    <!-- Questions List -->
    <div id="questionsContainer" class="space-y-6">
       <!-- Template for loading -->
       <div class="animate-pulse space-y-4">
          <div class="h-32 bg-gray-100 rounded-3xl"></div>
          <div class="h-32 bg-gray-100 rounded-3xl"></div>
       </div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-20">
       <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
       </div>
       <h3 class="text-xl font-black text-gray-900 mb-2">No questions curated yet</h3>
       <p class="text-gray-400 font-bold">Check back later for deep-dive questions.</p>
    </div>

  </main>

  <!-- JavaScript logic for fetching and rendering questions -->
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');

    async function init() {
      if (!courseId) {
        window.location.href = 'courses.html';
        return;
      }

      document.getElementById('backBtn').href = `practice.html?id=${courseId}`;

      try {
        const response = await fetch(`${API_URL}/api/questions/subject/${courseId}`);
        const allQuestions = await response.json();
        
        // Filter long questions (those with empty options array)
        const longQuestions = allQuestions.filter(q => !q.options || q.options.length === 0);
        
        // Format questions for display
        const formattedQuestions = longQuestions.map(q => ({
          q: q.question,
          a: q.correctAnswer
        }));

        if (formattedQuestions.length > 0) {
          document.getElementById('courseDisplay').textContent = `${courseId} • Long Questions`;
          renderQuestions(formattedQuestions);
        } else {
          renderQuestions([]);
        }
      } catch (err) {
        console.error("Error loading data:", err);
        renderQuestions([]);
      }
    }

    function renderQuestions(questions) {
      const container = document.getElementById('questionsContainer');
      const empty = document.getElementById('emptyState');

      if (questions.length === 0) {
        container.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      container.classList.remove('hidden');
      empty.classList.add('hidden');

      container.innerHTML = questions.map((q, idx) => `
        <div class="bg-white rounded-[2rem] border border-gray-100 shadow-sm p-8 transition-all hover:shadow-xl">
          <div class="flex items-start gap-6">
            <div class="w-12 h-12 rounded-2xl bg-purple-50 flex items-center justify-center flex-shrink-0 text-purple-600 font-black">
              ${idx + 1}
            </div>
            <div class="flex-1">
              <h3 class="text-xl font-bold text-gray-900 leading-relaxed mb-6">${escapeHtml(q.q)}</h3>
              <button onclick="toggleAnswer(${idx})" class="flex items-center gap-2 text-blue-600 font-black text-sm uppercase tracking-widest hover:text-blue-700">
                <span id="label-${idx}">Reveal Answer</span>
                <svg id="icon-${idx}" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>
              </button>
              <div id="answer-${idx}" class="answer-card mt-6 pt-6 border-t border-gray-50">
                <p class="text-gray-600 font-medium leading-relaxed">${escapeHtml(q.a)}</p>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }

    function toggleAnswer(idx) {
      const card = document.getElementById(`answer-${idx}`);
      const label = document.getElementById(`label-${idx}`);
      const icon = document.getElementById(`icon-${idx}`);
      
      const isVisible = card.classList.contains('visible');
      
      if (isVisible) {
        card.classList.remove('visible');
        label.textContent = "Reveal Answer";
        icon.style.transform = "rotate(0deg)";
      } else {
        card.classList.add('visible');
        label.textContent = "Hide Answer";
        icon.style.transform = "rotate(180deg)";
      }
    }

    init();
  </script>

</body>
</html>
