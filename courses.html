<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Site Title -->
  <title>My Courses | AOU Study Tracker</title>
  
  <!-- SEO Metadata -->
  <meta name="description" content="Manage your semester courses and track your acadmic progress on AOU Study Tracker." />
  <meta name="keywords" content="AOU Courses, Semester Tracking, Study Progress" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/logo.png" />
  
  <!-- Stylesheets & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .course-card {
      transition: all 0.3s ease;
    }

    .course-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>

<body class="bg-[#F8FAFC] min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="home.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
        <img src="img/logo.png" alt="AOU Logo" class="w-9 h-9 rounded-full object-cover" />
        <span class="font-black text-gray-900 text-lg tracking-tight">AOU Study Tracker</span>
      </a>
      <div class="flex items-center gap-8 text-sm font-semibold text-gray-500">
        <a href="home.html" class="flex items-center gap-2 hover:text-blue-600 transition-colors">Dashboard</a>
        <a href="courses.html" class="flex items-center gap-2 text-blue-600 font-bold">Courses</a>
        <a href="index.html" class="flex items-center gap-2 hover:text-red-500 transition-colors">Logout</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-6 py-10">

    <!-- Page Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
      <div>
        <h1 class="text-3xl font-black text-gray-900 mb-2">My Semester Courses</h1>
        <p class="text-gray-400 font-medium">Manage your progress and test your knowledge across your subjects.</p>
      </div>
      <a href="select-courses.html"
        class="inline-flex items-center justify-center gap-3 bg-white hover:bg-gray-50 text-gray-700 font-bold px-6 py-4 rounded-2xl border border-gray-100 shadow-sm transition-all group">
        <div
          class="w-8 h-8 rounded-xl bg-gray-50 flex items-center justify-center group-hover:bg-blue-50 transition-colors text-gray-400 group-hover:text-blue-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
        </div>
        Edit Courses
      </a>
    </div>

    <!-- Courses Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="coursesGrid">
      <!-- Loading state -->
      <div class="col-span-full py-20 text-center">
        <div class="animate-spin w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full mx-auto mb-4">
        </div>
        <p class="text-gray-400 font-bold">Syncing your courses...</p>
      </div>
    </div>

    <!-- Empty State (Hidden) -->
    <div id="emptyState"
      class="hidden col-span-full py-20 text-center bg-white rounded-3xl border border-dashed border-gray-200">
      <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-gray-300" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
        </svg>
      </div>
      <h3 class="text-xl font-bold text-gray-900 mb-2">No courses selected</h3>
      <p class="text-gray-400 mb-8 max-w-xs mx-auto">Please select the courses you are taking this semester to start
        tracking.</p>
      <a href="select-courses.html"
        class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-100 inline-block">
        Choose Courses
      </a>
    </div>

  </main>

  <!-- JavaScript logic to load and display enrolled courses -->
  <script>
    async function init() {
      const grid = document.getElementById('coursesGrid');
      const empty = document.getElementById('emptyState');

      const defaultCourses = ['MT101', 'M109', 'M251', 'TM103', 'MT131', 'MT132'];
      let selectedIds = JSON.parse(localStorage.getItem('aou_selected_courses'));

      if (!selectedIds) {
        selectedIds = defaultCourses;
        localStorage.setItem('aou_selected_courses', JSON.stringify(defaultCourses));
      }

      if (selectedIds.length === 0) {
        grid.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      try {
        const response = await fetch('data/courses.json');
        const data = await response.json();
        const allCourses = data.courses;

        // Filter for only selected courses
        const filteredCourses = allCourses.filter(c => selectedIds.includes(c.id));

        grid.innerHTML = filteredCourses.map(course => {
          const id = course.id;
          const totalTopics = course.topicsCount;
          const completed = JSON.parse(localStorage.getItem(`aou_progress_${id}`) || '[]');
          const count = completed.length;
          const percent = Math.round((count / totalTopics) * 100);

          const colorClass = course.color.replace('bg-', 'text-');

          return `
            <a href="course-details.html?id=${id}" class="course-card bg-white rounded-[2rem] border border-gray-100 p-8 cursor-pointer relative shadow-sm block hover:border-blue-200 group">
              <div class="flex items-start justify-between mb-8">
                <div class="w-16 h-16 rounded-2xl ${course.color} flex items-center justify-center shadow-lg shadow-gray-100 group-hover:rotate-6 transition-transform">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                </div>
                <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-300 group-hover:bg-blue-50 group-hover:text-blue-500 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"/></svg>
                </div>
              </div>
              
              <h2 class="text-xl font-black text-gray-900 mb-1 leading-tight line-clamp-2 min-h-[3rem]">${course.name}</h2>
              <p class="text-sm font-black uppercase tracking-widest mb-6 ${colorClass}">${id}</p>
              
              <div class="mb-4">
                <div class="flex justify-between items-end mb-2">
                  <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Total Progress</span>
                  <span class="text-lg font-black text-gray-900">${percent}%</span>
                </div>
                <div class="w-full bg-gray-50 rounded-full h-2 overflow-hidden border border-gray-100">
                  <div class="bg-blue-600 h-full transition-all duration-1000 ease-out" style="width:${percent}%"></div>
                </div>
              </div>
              
              <div class="flex items-center pt-6 border-t border-gray-50">
                <div class="flex items-center justify-between w-full">
                  <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Topics Completed</span>
                  <span class="text-sm font-black text-gray-700">${count}/${totalTopics} <span class="text-gray-300 font-bold ml-1"></span></span>
                </div>

              </div>
            </a>
          `;
        }).join('');

      } catch (err) {
        console.error("Error loading courses:", err);
      }
    }

    init();
  </script>

</body>

</html>
